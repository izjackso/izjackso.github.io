<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammerhead Sharks</title>
    <style>
        body {
            background-color: darkblue;
            font-family: 'Arial', sans-serif;
            display: flex;

        }

        .card {
            width: 500px;
            height: 750px;
            background-color: black;
            padding: 36px;
            border-radius: 12px;
            text-align: center;
            color: white;
        }

        .card img {
            width: 100%;
            height: 300px;

    <div class="card">
